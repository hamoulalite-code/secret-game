<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lobby - Secret Game</title>
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/lobby.css" />
</head>
<body>
  <header class="top">
    <h1 class="brand"><span class="brand-secret">secret</span><span class="brand-game">GAME</span></h1>
  </header>

  <main class="wrap">
    <div class="row between">
      <div>
        <h2>Choisis un serveur</h2>
        <p class="muted">Connexion : <span id="conn-state">…</span> • MAJ : <span id="last-update">—</span></p>
      </div>
      <div class="muted">Serveurs : <span id="rooms-count">0</span></div>
    </div>

    <!-- ✅ CREATION SERVEUR -->
    <section class="panel">
      <h3>Créer un serveur</h3>

      <div class="row" style="flex-wrap:wrap; gap:10px;">
        <input id="playerName" class="input" placeholder="Ton pseudo (ex: Ahmed)" />
        <input id="serverName" class="input" placeholder="Nom du serveur (ex: Maison 1)" />
        <input id="requiredPlayers" class="input" type="number" min="1" max="20" value="2" />
        <button id="btnCreate" class="btn">Créer</button>
      </div>

      <p class="muted" style="margin-top:10px;">
        Le jeu ne démarre que quand le nombre de joueurs requis est atteint.
      </p>
    </section>

    <!-- ✅ LISTE SERVEURS -->
    <section class="panel">
      <div class="row between">
        <h3>Liste des serveurs</h3>
        <button id="btnRefresh" class="btn ghost">Rafraîchir</button>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Nom</th>
              <th class="hide-sm">ID</th>
              <th>Joueurs</th>
              <th>Phase</th>
              <th class="right">Action</th>
            </tr>
          </thead>
          <tbody id="rooms-tbody"></tbody>
        </table>
      </div>

      <div id="empty" class="muted" style="margin-top:12px; display:none;">
        Aucun serveur pour l’instant.
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="./js/lobby.js"></script>
</body>
</html>
